# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: WAR build

on:
  push:
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the branch itself (not a detached HEAD at the commit SHA) so the
          # git-commit-id plugin records the real branch name in /version instead of the
          # full commit hash. (On a tag push ref_name is the tag; that build is a release
          # and shows up as HEAD, which is expected.)
          ref: ${{ github.ref_name }}
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: maven
      - name: Build war with Maven
        run: mvn -B -DskipTests=true compile package
      - name: Archive war
        uses: actions/upload-artifact@v4
        with:
          name: mapserver-war
          path: target/RMBTMapServer-*.war
          retention-days: 60

      - name: Intermediate file check
        run: |
          cd  target
          ls -l *
          zip mapserver.zip *.war
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files:
            target/mapserver.zip


