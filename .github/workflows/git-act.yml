name: Java CI
on: [workflow_dispatch, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the branch itself (not a detached HEAD at the commit SHA) so the
          # git-commit-id plugin records the real branch name in /version instead of the
          # full commit hash. (On a tag push ref_name is the tag; that build is a release
          # and shows up as HEAD, which is expected.)
          ref: ${{ github.ref_name }}
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: maven
      - name: Test
        run: mvn -B test
